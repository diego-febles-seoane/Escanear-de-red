{% extends 'panel/base.html' %}

{% block content %}
<style>
    /* Estilos para las burbujas de selección */
    .campo-bubble {
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .campo-bubble:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .campo-bubble.active {
        background: #10b981; /* green-500 */
        border-color: #10b981;
        color: white;
    }
    /* Estilos para corregir el contraste de los select */
    select option {
        background-color: #1f2937; /* gray-800 */
        color: white;
    }
    select:focus option {
        background-color: #1f2937;
        color: white;
    }
</style>

<div class="flex items-center justify-between mb-8">
    <div>
        <h2 class="text-3xl font-bold mb-2">Consulta personalizada</h2>
        <p class="text-gray-400 text-sm">Crea consultas personalizadas sobre los datos</p>
    </div>
</div>

<div class="glass-card rounded-2xl overflow-hidden">
    <div class="p-6 border-b border-white/10">
        <h3 class="text-xl font-semibold">Constructor de consultas</h3>
    </div>
    <div class="p-6 space-y-8">
        <!-- 1. Campos a elegir (Burbujas) -->
        <div>
            <label class="block text-sm text-gray-400 mb-4">Campos a mostrar</label>
            <div id="campos-container" class="space-y-6">
                <!-- Los campos se cargarán aquí organizados por categorías -->
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 2. Filtro y Valor -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Filtrar por</label>
                    <select id="filtro_campo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all">
                        <option value="">Sin filtro</option>
                        <option value="historial.ip">IP</option>
                        <option value="historial.mac">MAC</option>
                        <option value="historial.fabricante">Fabricante</option>
                        <option value="historial.tipo">Tipo dispositivo</option>
                        <option value="historial.ubicacion">Ubicación</option>
                        <option value="historial.fecha">Fecha</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Valor filtro</label>
                    <input type="text" id="filtro_valor" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all">
                </div>
            </div>

            <!-- 3. Fecha (Desde/Hasta) -->
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Fecha desde</label>
                        <input type="date" id="fecha_desde" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Fecha hasta</label>
                        <input type="date" id="fecha_hasta" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all">
                    </div>
                </div>
                <!-- 4. Orden y 5. Límite -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Ordenar por</label>
                        <select id="orden" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all">
                            <option value="">Sin ordenar</option>
                            <option value="historial.fecha">Fecha</option>
                            <option value="historial.ip">IP</option>
                            <option value="historial.fabricante">Fabricante</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Límite</label>
                        <input type="number" id="limite" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all" value="100">
                    </div>
                </div>
            </div>
        </div>

        <button id="buscar" class="w-full bg-gradient-to-r from-green-500 to-cyan-600 px-6 py-4 rounded-xl font-semibold hover:shadow-lg hover:shadow-green-500/30 transition-all">
            Ejecutar consulta
        </button>

        <div class="pt-6 border-t border-white/10">
            <div id="resultado" class="space-y-6">
                <p class="text-gray-500 text-center italic py-12">Los resultados aparecerán aquí...</p>
            </div>
            <!-- Paginación para Consulta Personalizada -->
            <div id="pagination-controls" class="p-6 border-t border-white/10 flex justify-center gap-2 hidden">
            </div>
        </div>
    </div>
</div>

<script>
    let queryData = [];
    let currentPage = 1;
    const recordsPerPage = 4;

    function displayQueryResults() {
        const resultadoDiv = document.getElementById("resultado");
        const paginationControls = document.getElementById("pagination-controls");
        resultadoDiv.innerHTML = '';
        
        const start = (currentPage - 1) * recordsPerPage;
        const end = start + recordsPerPage;
        const paginatedItems = queryData.slice(start, end);

        if (paginatedItems.length === 0) {
            resultadoDiv.innerHTML = `<p class='text-gray-400 text-center p-8 italic'>No se encontraron resultados.</p>`;
            paginationControls.classList.add('hidden');
            return;
        }

        paginationControls.classList.remove('hidden');

        paginatedItems.forEach((row, index) => {
            const actualIndex = start + index + 1;
            const registroCard = document.createElement('div');
            registroCard.className = 'glass-card rounded-2xl p-6 border border-white/5 hover:border-cyan-500/30 transition-all duration-300 animate-fadeIn';
            
            let cardContent = `
                <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">
                    <span class="text-xs font-mono text-cyan-400 uppercase tracking-widest"># --- registro ${actualIndex} ----</span>
                    <span class="text-xs text-gray-500">Resultado de consulta</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            `;

            Object.entries(row).forEach(([key, value]) => {
                let content = value || '-';
                let extraClass = '';
                const label = key.replace('historial.', '').replace('_', ' ').toUpperCase();

                // Formatear riesgos
                if (typeof content === 'string' && ['ALTO', 'MEDIO', 'BAJO'].includes(content.toUpperCase())) {
                    if (content.toUpperCase() === 'ALTO') extraClass = 'bg-red-500/10 text-red-500 border-red-500/20';
                    else if (content.toUpperCase() === 'MEDIO') extraClass = 'bg-amber-500/10 text-amber-500 border-amber-500/20';
                    else if (content.toUpperCase() === 'BAJO') extraClass = 'bg-green-500/10 text-green-500 border-green-500/20';
                    
                    content = `<span class="px-3 py-1 rounded-full text-xs font-bold border ${extraClass}">${content}</span>`;
                }

                // Formatear puertos si es un array
                if (Array.isArray(content)) {
                    content = content.map(p => p.puerto).join(', ') || 'Ninguno';
                    content = `<span class="text-cyan-400 font-mono text-xs">${content}</span>`;
                }

                cardContent += `
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase tracking-tighter text-gray-500 font-bold">${label}</label>
                        <div class="text-sm text-gray-200">${content}</div>
                    </div>
                `;
            });

            cardContent += `</div>`;
            registroCard.innerHTML = cardContent;
            resultadoDiv.appendChild(registroCard);
        });

        updatePagination();
    }

    function updatePagination() {
        const paginationControls = document.getElementById("pagination-controls");
        const totalPages = Math.ceil(queryData.length / recordsPerPage);
        paginationControls.innerHTML = '';

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        prevBtn.className = `px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition-all ${currentPage === 1 ? 'opacity-30 cursor-not-allowed' : ''}`;
        prevBtn.onclick = () => { if(currentPage > 1) { currentPage--; displayQueryResults(); } };
        paginationControls.appendChild(prevBtn);

        const pageInfo = document.createElement('span');
        pageInfo.className = "px-4 py-2 text-sm text-gray-400 flex items-center";
        pageInfo.innerText = `${currentPage} / ${totalPages}`;
        paginationControls.appendChild(pageInfo);

        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
        nextBtn.className = `px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition-all ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : ''}`;
        nextBtn.onclick = () => { if(currentPage < totalPages) { currentPage++; displayQueryResults(); } };
        paginationControls.appendChild(nextBtn);
    }

    // Cargar campos y crear burbujas organizadas
    fetch('{% url "query_campos" %}')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("campos-container");
            container.innerHTML = "";

            const categorias = {
                'historial': { label: 'Historial de Dispositivos', campos: [] },
                'nombres': { label: 'Nombres Personalizados', campos: [] },
                'logs': { label: 'Logs de Sistema', campos: [] }
            };

            // Clasificar campos
            data.forEach(campo => {
                const prefix = campo.campo.split('.')[0];
                if (categorias[prefix]) {
                    categorias[prefix].campos.push(campo);
                }
            });

            // Renderizar categorías
            Object.entries(categorias).forEach(([key, cat]) => {
                if (cat.campos.length === 0) return;

                const section = document.createElement("div");
                section.className = "space-y-3";
                
                section.innerHTML = `
                    <h4 class="text-xs font-bold text-cyan-500/70 uppercase tracking-widest border-b border-white/5 pb-2">${cat.label}</h4>
                    <div id="campos-${key}" class="flex flex-wrap gap-2"></div>
                `;
                
                container.appendChild(section);
                const bubbleContainer = section.querySelector(`#campos-${key}`);

                cat.campos.forEach(campo => {
                    const bubble = document.createElement("div");
                    bubble.className = "campo-bubble px-4 py-2 rounded-full text-sm text-gray-300 bg-white/5 cursor-pointer hover:bg-white/10 transition-all border border-white/5";
                    bubble.innerText = campo.label;
                    bubble.dataset.value = campo.campo;
                    
                    bubble.addEventListener("click", () => {
                        bubble.classList.toggle("active");
                        bubble.classList.toggle("bg-cyan-500/20");
                        bubble.classList.toggle("text-cyan-400");
                        bubble.classList.toggle("border-cyan-500/30");
                    });

                    bubbleContainer.appendChild(bubble);
                });
            });
        });

    function getSelectedFields() {
        return Array.from(document.querySelectorAll(".campo-bubble.active"))
            .map(b => b.dataset.value);
    }

    document.getElementById("buscar").addEventListener("click", function () {
        const camposSeleccionados = getSelectedFields();

        if (camposSeleccionados.length === 0) {
            alert("Por favor, selecciona al menos un campo para mostrar.");
            return;
        }

        const resultadoDiv = document.getElementById("resultado");
        resultadoDiv.innerHTML = `
            <div class="flex flex-col items-center justify-center p-12 space-y-4">
                <div class="animate-spin text-cyan-400 text-4xl"><i class="fa-solid fa-circle-notch"></i></div>
                <p class='text-cyan-400 font-medium'>Ejecutando consulta personalizada...</p>
            </div>
        `;
        resultadoDiv.classList.add('bg-black/30');
        resultadoDiv.classList.remove('p-0');

        fetch('{% url "ejecutar_query" %}', {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                campos: camposSeleccionados,
                limite: document.getElementById("limite").value,
                orden: document.getElementById("orden").value,
                filtro: {
                    campo: document.getElementById("filtro_campo").value,
                    valor: document.getElementById("filtro_valor")?.value || ""
                },
                fecha_desde: document.getElementById("fecha_desde").value,
                fecha_hasta: document.getElementById("fecha_hasta").value
            })
        })
            .then(response => response.json())
        .then(data => {
            const resultadoDiv = document.getElementById("resultado");
            if (data.error) {
                resultadoDiv.innerHTML = `<p class='text-red-400 p-4'>Error: ${data.error}</p>`;
            } else {
                queryData = data;
                currentPage = 1;
                displayQueryResults();
            }
        })
            .catch(err => {
                document.getElementById("resultado").innerHTML =
                    "<p class='text-red-400'>Error de conexión: " + err.message + "</p>";
            });
    });
</script>
{% endblock %}
