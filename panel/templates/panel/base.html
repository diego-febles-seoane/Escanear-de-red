{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScanner - Escáner de Red</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #9ca3af;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transform: translateX(4px);
        }
        .sidebar-link.active {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            font-weight: 600;
        }
        .sidebar-link i {
            width: 20px;
            text-align: center;
        }
        
        /* Animaciones globales */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(34, 197, 94, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        
        button, .btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        /* Transiciones de pantalla */
        main {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Ocultar scrollbars pero mantener funcionalidad */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-[#0a0e17] text-white min-h-screen flex font-sans">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <aside class="w-72 bg-[#0e1420] border-r border-white/5 flex flex-col z-10 relative">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-500 to-cyan-600 flex items-center justify-center shadow-lg shadow-green-500/20">
                    <i class="fa-solid fa-radar text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">NetScanner</h1>
                    <p class="text-xs text-gray-500">Escáner de Red</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="mb-6">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-3 px-3">Menú</p>
                <a href="{% url 'index' %}" class="sidebar-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
                    <i class="fa-solid fa-gauge-high"></i>
                    Dashboard
                </a>
            </div>

            <div class="mb-6">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-3 px-3">Escaneo</p>
                <a href="{% url 'inventario' %}" class="sidebar-link {% if request.resolver_match.url_name == 'inventario' %}active{% endif %}">
                    <i class="fa-solid fa-list-check"></i>
                    Inventario
                </a>
                <a href="{% url 'query' %}" class="sidebar-link {% if request.resolver_match.url_name == 'query' %}active{% endif %}">
                    <i class="fa-solid fa-search"></i>
                    Consulta Personalizada
                </a>
                <a href="{% url 'topologia' %}" class="sidebar-link {% if request.resolver_match.url_name == 'topologia' %}active{% endif %}">
                    <i class="fa-solid fa-sitemap"></i>
                    Topología
                </a>
                <a href="{% url 'alertas' %}" class="sidebar-link {% if request.resolver_match.url_name == 'alertas' %}active{% endif %}">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    Alertas
                </a>
            </div>
        </nav>

        <div class="p-4 border-t border-white/5 space-y-3">
            <a href="{% url 'logout' %}" class="sidebar-link text-red-400 hover:text-red-300">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 z-10 relative">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Botón de cambio de tema -->
    <button id="themeToggle" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-gradient-to-br from-green-500 to-cyan-600 flex items-center justify-center shadow-lg shadow-green-500/20 z-50 hover:scale-110 transition-transform">
        <i id="themeIcon" class="fa-solid fa-sun text-2xl"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        // Cargar tema guardado
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            if (theme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }
    </script>
</body>
</html>
