{% extends 'panel/base.html' %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h2 class="text-3xl font-bold mb-2">Inventario de Dispositivos</h2>
        <p class="text-gray-400 text-sm">Dispositivos registrados en el inventario</p>
    </div>
</div>

<div class="glass-card rounded-2xl overflow-hidden">
    <div class="p-6 border-b border-white/10 flex justify-between items-center">
        <h3 class="text-xl font-semibold">MAC y Nombre del Dispositivo</h3>
        <div id="pagination-info" class="text-sm text-gray-400"></div>
    </div>
    <div class="overflow-x-auto scrollbar-hide">
        <table class="w-full">
            <thead class="bg-white/5 text-gray-400 text-xs uppercase">
                <tr>
                    <th class="p-5 text-left">MAC</th>
                    <th class="p-5 text-left">Nombre del Dispositivo</th>
                </tr>
            </thead>
            <tbody id="inventario-tbody">
                <!-- Se carga vía JavaScript -->
            </tbody>
        </table>
    </div>
    <!-- Paginación -->
    <div class="p-4 border-t border-white/10 flex justify-center gap-2" id="pagination-controls">
    </div>
</div>

<!-- Datos iniciales desde Django -->
<script id="inventario-data" type="application/json">
    {{ dispositivos|safe }}
</script>

<script>
    const tableBody = document.getElementById('inventario-tbody');
    const paginationControls = document.getElementById('pagination-controls');
    const paginationInfo = document.getElementById('pagination-info');

    // Cargar datos
    const allDevices = JSON.parse(document.getElementById('inventario-data').textContent.replace(/'/g, '"'));
    let currentPage = 1;
    const recordsPerPage = 15;

    function displayInventory() {
        tableBody.innerHTML = '';
        const start = (currentPage - 1) * recordsPerPage;
        const end = start + recordsPerPage;
        const paginatedItems = allDevices.slice(start, end);

        if (paginatedItems.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-gray-500">No hay dispositivos registrados en el inventario.</td></tr>';
            return;
        }

        paginatedItems.forEach(item => {
            tableBody.innerHTML += `
                <tr class="table-row border-b border-white/5 hover:bg-white/5 transition-all duration-300 hover:translate-x-1">
                    <td class="p-5 font-medium font-mono text-cyan-400">${item.mac}</td>
                    <td class="p-5">${item.nombre_dispositivo || '-'}</td>
                </tr>
            `;
        });
        updatePaginationControls();
    }

    function updatePaginationControls() {
        const totalPages = Math.ceil(allDevices.length / recordsPerPage);
        paginationControls.innerHTML = '';
        paginationInfo.innerText = `Pág. ${currentPage}/${totalPages || 1} (${allDevices.length} dispositivos)`;

        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        prevBtn.className = `px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition-all ${currentPage === 1 ? 'opacity-30 cursor-not-allowed' : ''}`;
        prevBtn.onclick = () => { if(currentPage > 1) { currentPage--; displayInventory(); } };
        paginationControls.appendChild(prevBtn);

        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
        nextBtn.className = `px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition-all ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : ''}`;
        nextBtn.onclick = () => { if(currentPage < totalPages) { currentPage++; displayInventory(); } };
        paginationControls.appendChild(nextBtn);
    }

    // Inicializar
    displayInventory();
</script>
{% endblock %}
