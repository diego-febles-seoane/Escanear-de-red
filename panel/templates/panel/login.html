{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScanner - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #0e1420 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="glass-card rounded-2xl p-8 w-full max-w-md z-10 relative">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-green-500 to-cyan-600 flex items-center justify-center shadow-lg shadow-green-500/30 mx-auto mb-4">
                <i class="fa-solid fa-radar text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">NetScanner</h1>
            <p class="text-gray-400 text-sm mt-2">Escáner de Red</p>
        </div>

        {% if error %}
            <div class="bg-red-500/20 border border-red-500/50 rounded-xl p-4 mb-6 flex items-center gap-3">
                <i class="fa-solid fa-exclamation-triangle text-red-400"></i>
                <span class="text-red-300">{{ error }}</span>
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="mongo_user" class="block text-sm text-gray-400 mb-2">Usuario de MongoDB</label>
                <input type="text" id="mongo_user" name="mongo_user" required autofocus
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition-all">
            </div>

            <div>
                <label for="mongo_password" class="block text-sm text-gray-400 mb-2">Contraseña de MongoDB</label>
                <input type="password" id="mongo_password" name="mongo_password" required
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition-all">
            </div>

            <div>
                <label for="mongo_host" class="block text-sm text-gray-400 mb-2">Host de MongoDB</label>
                <input type="text" id="mongo_host" name="mongo_host" value="redes.x6wgvks.mongodb.net" required
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 transition-all">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-cyan-600 px-6 py-4 rounded-xl font-semibold hover:shadow-lg hover:shadow-green-500/30 transition-all">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Iniciar Sesión
            </button>
        </form>
    </div>
</body>
</html>
