<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escáner de Red</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --laberit-dark: #0c1c2c;
            --laberit-red: #e40424;
            --laberit-gray-light: #dce1e6;
            --laberit-white: #ffffff;
            --laberit-gray-dark: #2c3e50;
        }

        body {
            background-color: var(--laberit-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--laberit-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--laberit-white);
            border-radius: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            background-color: var(--laberit-dark);
            padding: 2rem;
            text-align: center;
        }

        .login-header h1 {
            color: var(--laberit-white);
            font-weight: 800;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .login-header h1 span {
            color: var(--laberit-red);
        }

        .login-body {
            padding: 2rem;
        }

        .form-label {
            color: var(--laberit-dark);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .form-control {
            border: 2px solid var(--laberit-gray-light);
            border-radius: 0;
            padding: 0.8rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--laberit-red);
            box-shadow: 0 0 0 0.2rem rgba(228, 4, 36, 0.15);
        }

        .btn-login {
            background-color: var(--laberit-red);
            border-color: var(--laberit-red);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            padding: 0.9rem;
            border-radius: 0;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background-color: #b3031c;
            border-color: #b3031c;
            color: white;
            transform: translateY(-2px);
        }

        .alert-error {
            background-color: var(--laberit-red);
            color: white;
            border: none;
            border-radius: 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h1>Escáner de <span>Red</span></h1>
            </div>
            <div class="login-body">
                {% if error %}
                    <div class="alert alert-error mb-4">
                        <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
                    </div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="mongo_user" class="form-label">Usuario de MongoDB</label>
                        <input type="text" class="form-control" id="mongo_user" name="mongo_user" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="mongo_password" class="form-label">Contraseña de MongoDB</label>
                        <input type="password" class="form-control" id="mongo_password" name="mongo_password" required>
                    </div>
                    <div class="mb-4">
                        <label for="mongo_host" class="form-label">Host de MongoDB</label>
                        <input type="text" class="form-control" id="mongo_host" name="mongo_host" value="redes.x6wgvks.mongodb.net" required>
                    </div>
                    <button type="submit" class="btn btn-login w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
