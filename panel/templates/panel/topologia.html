{% extends 'panel/base.html' %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h2 class="text-3xl font-bold mb-2">Topología de red</h2>
        <p class="text-gray-400 text-sm">Visualización de dispositivos activos en la red</p>
    </div>
    <button id="actualizarTopologia" class="bg-gradient-to-r from-green-500 to-cyan-600 px-6 py-3 rounded-xl font-semibold hover:shadow-lg hover:shadow-green-500/30 transition-all">
        <i class="fa-solid fa-sync-alt"></i> Actualizar topología
    </button>
</div>

<div class="glass-card rounded-2xl overflow-hidden">
    <div class="p-6 border-b border-white/10">
        <h3 class="text-xl font-semibold">Dispositivos activos</h3>
    </div>
    <div class="p-6">
        <div id="network" style="height:650px; background: rgba(0,0,0,0.3); border-radius: 12px;"></div>
    </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
function dibujarTopologia(data) {
    const nodes = []
    const edges = []

    nodes.push({
        id: "gateway",
        label: "Gateway / Router",
        shape: "box",
        color: {
            background: '#22c55e',
            border: '#06b6d4'
        },
        font: { color: '#ffffff' }
    })

    data.forEach((device, index) => {
        let nodeId = device.mac || device.ip || index

        nodes.push({
            id: nodeId,
            label: (device.nombre_dispositivo || "Dispositivo") + "\n" + (device.ip || "-") + "\n" + (device.riesgo || "SIN RIESGO"),
            title: "MAC: " + (device.mac || "-") + "<br>" +
                   "Fabricante: " + (device.fabricante || "-") + "<br>" +
                   "Tipo: " + (device.tipo_dispositivo || "-"),
            shape: "dot",
            color: {
                background: '#06b6d4',
                border: '#22c55e'
            },
            font: { color: '#ffffff' }
        })

        edges.push({
            from: "gateway",
            to: nodeId,
            color: { color: '#4b5563' }
        })
    })

    let container = document.getElementById("network")
    let networkData = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    }

    let options = {
        physics: { enabled: true },
        interaction: { hover: true },
        nodes: {
            borderWidth: 2,
            shadow: true
        },
        edges: {
            width: 2
        }
    }

    new vis.Network(container, networkData, options)
}

/* CARGA INICIAL */
fetch("{% url 'get_activos' %}")
    .then(r => r.json())
    .then(data => {
        dibujarTopologia(data)
    })

/* BOTON ACTUALIZAR */
document.getElementById("actualizarTopologia").addEventListener("click", function() {
    fetch("{% url 'topologia_datos' %}")
        .then(r => r.json())
        .then(data => {
            dibujarTopologia(data)
        })
})
</script>
{% endblock %}
